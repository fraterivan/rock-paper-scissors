<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Rock, paper, scissors</title>
</head>
<body>
    <h1>Rock, paper, scissors</h1>

    <div id="game">
        <div id="scoreboard">
            <p>Player: <span id="player-score">0</span></p>
            <p>CPU: <span id="cpu-score">0</span></p>
        </div>

        <div id="choices">
            <button class="choice-btn" data-choice="rock">Rock</button>
            <button class="choice-btn" data-choice="paper">Paper</button>
            <button class="choice-btn" data-choice="scissors">Scissors</button>
        </div>

        <div id="picks">
            <p>You picked: <span id="player-choice"></span></p>
            <p>CPU picked: <span id="cpu-choice"></span></p>
        </div>

        <div id="results">
            <h2 id="round-result"></h2>
        </div>

        <button id="reset-btn">Reset</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
